<nav class="sticky top-0 z-50 bg-white dark:bg-dark-card border-b border-border dark:border-dark-border transition-colors duration-300">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">

    <!-- Left: Logo + Nav links -->
    <div class="flex items-center gap-10">

      <!-- Logo -->
      <a routerLink="/dashboard" class="shrink-0">
        <img [src]="theme.darkMode() ? 'logo-dark.svg' : 'logo.svg'" alt="WeTeach" class="h-8" />
      </a>

      <!-- Nav links (desktop) -->
      <div class="hidden lg:flex items-center gap-8">
        <a
          *ngFor="let link of navLinks"
          [routerLink]="link.route"
          routerLinkActive="!text-primary !font-semibold"
          class="text-sm font-medium text-text-secondary dark:text-dark-text-secondary hover:text-primary dark:hover:text-primary transition-colors whitespace-nowrap"
        >
          {{ link.label }}
        </a>
      </div>

    </div>

    <!-- Right: Icons + User -->
    <div class="flex items-center gap-1 sm:gap-3">

      <!-- Messages -->
      <button
        class="relative w-10 h-10 rounded-xl flex items-center justify-center text-text-secondary dark:text-dark-text-secondary hover:bg-bg-subtle dark:hover:bg-dark-input transition"
      >
        <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
        </svg>
        <span
          *ngIf="messagesCount > 0"
          class="absolute top-0.5 right-0.5 min-w-[18px] h-[18px] px-1 flex items-center justify-center bg-primary text-white text-[10px] font-bold rounded-full leading-none"
        >
          {{ messagesCount }}
        </span>
      </button>

      <!-- Notifications -->
      <button
        class="relative w-10 h-10 rounded-xl flex items-center justify-center text-text-secondary dark:text-dark-text-secondary hover:bg-bg-subtle dark:hover:bg-dark-input transition"
      >
        <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
        </svg>
        <span
          *ngIf="notificationsCount > 0"
          class="absolute top-0.5 right-0.5 min-w-[18px] h-[18px] px-1 flex items-center justify-center bg-error text-white text-[10px] font-bold rounded-full leading-none"
        >
          {{ notificationsCount }}
        </span>
      </button>

      <!-- Divider -->
      <div class="hidden sm:block w-px h-8 bg-border dark:bg-dark-border mx-1"></div>

      <!-- User -->
      <a routerLink="/profile" class="flex items-center gap-2.5 hover:opacity-80 transition">
        <div class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center">
          <span class="text-primary font-semibold text-sm">JK</span>
        </div>
        <span class="hidden sm:block text-sm font-medium text-text-primary dark:text-dark-text-primary">Jan Kowalski</span>
      </a>

      <!-- Mobile hamburger -->
      <button
        (click)="toggleMobileMenu()"
        class="lg:hidden w-10 h-10 rounded-xl flex items-center justify-center text-text-secondary dark:text-dark-text-secondary hover:bg-bg-subtle dark:hover:bg-dark-input transition ml-1"
      >
        <svg *ngIf="!mobileMenuOpen" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
        <svg *ngIf="mobileMenuOpen" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

    </div>

  </div>

  <!-- Mobile dropdown -->
  <div
    *ngIf="mobileMenuOpen"
    class="lg:hidden border-t border-border dark:border-dark-border bg-white dark:bg-dark-card shadow-lg"
  >
    <div class="px-4 py-3 flex flex-col gap-1">
      <a
        *ngFor="let link of navLinks"
        [routerLink]="link.route"
        routerLinkActive="text-primary bg-primary/5 font-semibold"
        (click)="mobileMenuOpen = false"
        class="px-4 py-3 rounded-xl text-sm font-medium text-text-secondary dark:text-dark-text-secondary hover:text-primary hover:bg-bg-subtle dark:hover:bg-dark-input transition-colors"
      >
        {{ link.label }}
      </a>
    </div>
  </div>

</nav>
