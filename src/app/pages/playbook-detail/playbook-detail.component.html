<div class="min-h-screen bg-bg-subtle dark:bg-dark-bg transition-colors duration-300">

  <!-- Topbar -->
  <header class="bg-white dark:bg-dark-card border-b border-border dark:border-dark-border px-6 py-4 transition-colors duration-300">
    <div class="max-w-4xl mx-auto flex items-center gap-4">
      <button
        routerLink="/dashboard"
        class="w-9 h-9 rounded-xl border border-border dark:border-dark-border flex items-center justify-center text-text-secondary dark:text-dark-text-secondary hover:border-primary hover:text-primary transition"
      >
        ←
      </button>
      <img [src]="theme.darkMode() ? '/logo-dark.svg' : '/logo.svg'" alt="WeTeach" class="h-8" />
    </div>
  </header>

  <!-- Hero Playbooka -->
  <div class="bg-bg-dark text-white px-6 py-12">
    <div class="max-w-4xl mx-auto">
      <span class="inline-flex items-center gap-1.5 bg-white/10 text-xs font-medium px-3 py-1.5 rounded-full mb-4">
        {{ playbook.icon }} {{ playbook.role }}
      </span>
      <h1 class="text-3xl font-bold mb-3">{{ playbook.title }}</h1>
      <p class="text-text-muted text-base max-w-xl leading-relaxed">
        {{ playbook.description }}
      </p>

      <!-- Progres -->
      <div class="mt-8 flex items-center gap-4">
        <div class="flex-1 max-w-xs">
          <div class="flex justify-between text-xs text-text-muted mb-1.5">
            <span>Postęp kursu</span>
            <span class="text-white font-medium">{{ playbook.progress }}%</span>
          </div>
          <div class="w-full h-2 bg-white/10 rounded-full overflow-hidden">
            <div
              class="h-full bg-primary rounded-full transition-all duration-500"
              [style.width.%]="playbook.progress"
            ></div>
          </div>
        </div>
        <span class="text-xs text-text-muted">{{ playbook.completedCount }} z {{ playbook.modules.length }} modułów</span>
      </div>
    </div>
  </div>

  <!-- Moduły -->
  <main class="max-w-4xl mx-auto px-6 py-10">

    <h2 class="text-lg font-semibold text-text-primary dark:text-dark-text-primary mb-5">Moduły</h2>

    <div class="flex flex-col gap-3">

      <div
        *ngFor="let module of playbook.modules; let i = index"
        class="bg-white dark:bg-dark-card rounded-2xl border border-border dark:border-dark-border px-6 py-5 flex items-center gap-4 hover:border-primary/30 hover:shadow-sm transition-all duration-200 cursor-pointer"
        [class.opacity-50]="module.locked"
      >

        <!-- Status ikona -->
        <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0"
             [ngClass]="{
               'bg-green/10': module.status === 'done',
               'bg-primary/10': module.status === 'active',
               'bg-border dark:bg-dark-border': module.status === 'locked'
             }">
          <span *ngIf="module.status === 'done'"  class="text-green text-lg">✓</span>
          <span *ngIf="module.status === 'active'" class="text-primary font-bold text-sm">{{ i + 1 }}</span>
          <span *ngIf="module.status === 'locked'" class="text-text-muted dark:text-dark-text-muted text-sm">🔒</span>
        </div>

        <!-- Treść -->
        <div class="flex-1">
          <div class="flex items-center gap-2">
            <h3 class="text-sm font-semibold text-text-primary dark:text-dark-text-primary">{{ module.title }}</h3>
            <span *ngIf="module.status === 'active'"
                  class="text-[10px] font-medium bg-primary/10 text-primary px-2 py-0.5 rounded-full">
              W trakcie
            </span>
          </div>
          <p class="text-xs text-text-muted dark:text-dark-text-muted mt-0.5">{{ module.duration }}</p>
        </div>

        <!-- Przycisk -->
        <button
          *ngIf="!module.locked"
          class="text-xs font-semibold px-4 py-2 rounded-full transition-all duration-200"
          [ngClass]="{
            'bg-primary text-white hover:bg-primary-dark': module.status === 'active',
            'text-primary border border-primary hover:bg-primary hover:text-white': module.status === 'done'
          }"
        >
          {{ module.status === 'done' ? 'Powtórz' : 'Kontynuuj' }}
        </button>

      </div>

    </div>

  </main>

</div>
