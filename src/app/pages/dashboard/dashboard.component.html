<div class="min-h-screen bg-bg-subtle">

  <!-- Topbar -->
  <header class="bg-white border-b border-border px-6 py-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">

      <!-- Logo -->
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-primary rounded-xl flex items-center justify-center">
          <span class="text-white font-bold">W</span>
        </div>
        <span class="text-lg font-bold text-text-primary">WeTeach</span>
      </div>

      <!-- User -->
      <div class="flex items-center gap-3">
        <span class="text-sm text-text-secondary">Jan Kowalski</span>
        <div class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center">
          <span class="text-primary font-semibold text-sm">JK</span>
        </div>
      </div>

    </div>
  </header>

  <!-- Content -->
  <main class="max-w-5xl mx-auto px-6 py-10">

    <!-- Powitanie -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-text-primary">Witaj z powrotem, Jan!</h1>
      <p class="text-text-secondary mt-1">Twoje Playbooki są gotowe do nauki.</p>
    </div>

    <!-- Badge subskrypcji -->
    <div class="inline-flex items-center gap-2 bg-primary/[0.06] text-primary text-xs font-medium px-3 py-1.5 rounded-full mb-8">
      <span class="w-1.5 h-1.5 rounded-full bg-green"></span>
      Subskrypcja aktywna
    </div>

    <!-- Grid Playbootów -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">

      <!-- Karta Playbooka -->
      <div
        *ngFor="let playbook of playbooks"
        class="bg-white rounded-2xl border border-border shadow-sm hover:shadow-md transition-all duration-200 cursor-pointer group p-6 flex flex-col gap-4"
        [routerLink]="['/playbook', playbook.id]"
      >
        <!-- Ikona kategorii -->
        <div class="w-11 h-11 rounded-xl flex items-center justify-center text-xl"
             [ngClass]="playbook.iconBg">
          {{ playbook.icon }}
        </div>

        <!-- Treść -->
        <div class="flex-1">
          <span class="text-xs font-medium text-text-muted uppercase tracking-wide">{{ playbook.category }}</span>
          <h3 class="text-base font-semibold text-text-primary mt-1 group-hover:text-primary transition">
            {{ playbook.title }}
          </h3>
          <p class="text-sm text-text-secondary mt-1.5 leading-relaxed">{{ playbook.description }}</p>
        </div>

        <!-- Progres -->
        <div class="flex flex-col gap-1.5">
          <div class="flex justify-between text-xs text-text-muted">
            <span>Postęp</span>
            <span class="font-medium text-text-secondary">{{ playbook.progress }}%</span>
          </div>
          <div class="w-full h-1.5 bg-border rounded-full overflow-hidden">
            <div
              class="h-full bg-primary rounded-full transition-all duration-500"
              [style.width.%]="playbook.progress"
            ></div>
          </div>
        </div>

        <!-- CTA -->
        <button class="w-full py-2.5 text-sm font-semibold rounded-full border border-primary text-primary hover:bg-primary hover:text-white transition-all duration-200">
          {{ playbook.progress > 0 ? 'Kontynuuj' : 'Rozpocznij' }}
        </button>

      </div>

    </div>

  </main>

</div>
