<div class="min-h-screen bg-bg-subtle dark:bg-dark-bg transition-colors duration-300">

  <!-- Content -->
  <main class="max-w-5xl mx-auto px-6 py-10">

    <!-- Powitanie -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-text-primary dark:text-dark-text-primary">Witaj z powrotem, Jan!</h1>
      <p class="text-text-secondary dark:text-dark-text-secondary mt-1">Twoje Playbooki są gotowe do nauki.</p>
    </div>

    <!-- Badge subskrypcji -->
    <div class="inline-flex items-center gap-2 bg-primary/[0.06] text-primary text-xs font-medium px-3 py-1.5 rounded-full mb-8">
      <span class="w-1.5 h-1.5 rounded-full bg-green"></span>
      Subskrypcja aktywna
    </div>

    <!-- Grid Playbooków -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

      <!-- Karta Playbooka -->
      <div
        *ngFor="let playbook of playbooks"
        class="bg-white dark:bg-dark-card rounded-2xl border border-border dark:border-dark-border shadow-sm hover:shadow-md transition-all duration-200 cursor-pointer group p-6 flex flex-col gap-4"
        [routerLink]="['/playbook', playbook.id]"
      >
        <!-- Ikona kategorii -->
        <div class="w-11 h-11 rounded-xl flex items-center justify-center text-xl"
             [ngClass]="playbook.iconBg">
          {{ playbook.icon }}
        </div>

        <!-- Treść -->
        <div class="flex-1">
          <span class="text-xs font-medium text-text-muted dark:text-dark-text-muted uppercase tracking-wide">{{ playbook.role }}</span>
          <h3 class="text-base font-semibold text-text-primary dark:text-dark-text-primary mt-1 group-hover:text-primary transition">
            {{ playbook.title }}
          </h3>
          <p class="text-sm text-text-secondary dark:text-dark-text-secondary mt-1.5 leading-relaxed">{{ playbook.description }}</p>
        </div>

        <!-- Average rating -->
        <div class="flex items-center gap-1 text-xs text-text-muted dark:text-dark-text-muted">
          <svg class="w-4 h-4 text-warning fill-warning" viewBox="0 0 24 24">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
          </svg>
          <span class="font-semibold text-text-primary dark:text-dark-text-primary">{{ playbook.avgRating }}</span>
          <span>({{ playbook.ratingsCount }} ocen)</span>
        </div>

        <!-- Progres -->
        <div class="flex flex-col gap-1.5">
          <div class="flex justify-between text-xs text-text-muted dark:text-dark-text-muted">
            <span>Postęp</span>
            <span class="font-medium text-text-secondary dark:text-dark-text-secondary">{{ playbook.progress }}%</span>
          </div>
          <div class="w-full h-1.5 bg-border dark:bg-dark-border rounded-full overflow-hidden">
            <div
              class="h-full bg-primary rounded-full transition-all duration-500"
              [style.width.%]="playbook.progress"
            ></div>
          </div>
        </div>

        <!-- CTA -->
        <button class="w-full py-2.5 text-sm font-semibold rounded-full border border-primary text-primary hover:bg-primary hover:text-white transition-all duration-200">
          {{ playbook.progress > 0 ? 'Kontynuuj' : 'Rozpocznij' }}
        </button>

      </div>

    </div>

  </main>

</div>
