<div class="min-h-screen bg-bg-subtle flex items-center justify-center px-4">

  <!-- Card -->
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-10">

    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 bg-primary rounded-xl flex items-center justify-center">
          <span class="text-white font-bold text-lg">W</span>
        </div>
        <span class="text-xl font-bold text-text-primary">WeTeach</span>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="text-2xl font-bold text-text-primary text-center mb-1">Zaloguj się</h1>
    <p class="text-sm text-text-secondary text-center mb-8">Dostęp do Twoich Playbootów</p>

    <!-- Form -->
    <form class="flex flex-col gap-5">

      <!-- Email -->
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-text-primary">Email</label>
        <input
          type="email"
          placeholder="jan@firma.pl"
          class="w-full px-4 py-3 rounded-xl border border-border text-text-primary text-sm placeholder:text-text-muted outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/10"
        />
      </div>

      <!-- Hasło -->
      <div class="flex flex-col gap-1.5">
        <div class="flex justify-between items-center">
          <label class="text-sm font-medium text-text-primary">Hasło</label>
          <a href="#" class="text-xs text-primary hover:text-primary-dark font-medium transition">
            Zapomniałeś hasła?
          </a>
        </div>
        <input
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-border text-text-primary text-sm placeholder:text-text-muted outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/10"
        />
      </div>

      <!-- Przycisk -->
      <button
        type="submit"
        class="w-full py-3 bg-primary hover:bg-primary-dark text-white font-semibold text-sm rounded-full transition-all duration-200 shadow-md hover:shadow-glow mt-1"
      >
        Zaloguj się
      </button>

    </form>

    <!-- Footer -->
    <p class="text-xs text-text-muted text-center mt-8">
      Problemy z logowaniem? <a href="mailto:support@weteach.ai" class="text-primary hover:underline">Napisz do nas</a>
    </p>

  </div>

</div>
