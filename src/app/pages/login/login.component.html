<div class="min-h-screen bg-[#F8F9FD] flex items-center justify-center px-4">

  <!-- Card -->
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-10">

    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 bg-[#6C3CE0] rounded-xl flex items-center justify-center">
          <span class="text-white font-bold text-lg">W</span>
        </div>
        <span class="text-xl font-bold text-[#1E2235]">WeTeach</span>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="text-2xl font-bold text-[#1E2235] text-center mb-1">Zaloguj się</h1>
    <p class="text-sm text-[#4B5563] text-center mb-8">Dostęp do Twoich Playbootów</p>

    <!-- Form -->
    <form class="flex flex-col gap-5">

      <!-- Email -->
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-[#1E2235]">Email</label>
        <input
          type="email"
          placeholder="jan@firma.pl"
          class="w-full px-4 py-3 rounded-xl border border-[#E5E7EB] text-[#1E2235] text-sm placeholder:text-[#9CA3AF] outline-none transition focus:border-[#6C3CE0] focus:ring-2 focus:ring-[#6C3CE0]/10"
        />
      </div>

      <!-- Hasło -->
      <div class="flex flex-col gap-1.5">
        <div class="flex justify-between items-center">
          <label class="text-sm font-medium text-[#1E2235]">Hasło</label>
          <a href="#" class="text-xs text-[#6C3CE0] hover:text-[#5B21B6] font-medium transition">
            Zapomniałeś hasła?
          </a>
        </div>
        <input
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-[#E5E7EB] text-[#1E2235] text-sm placeholder:text-[#9CA3AF] outline-none transition focus:border-[#6C3CE0] focus:ring-2 focus:ring-[#6C3CE0]/10"
        />
      </div>

      <!-- Przycisk -->
      <button
        type="submit"
        class="w-full py-3 bg-[#6C3CE0] hover:bg-[#5B21B6] text-white font-semibold text-sm rounded-full transition-all duration-200 shadow-md hover:shadow-[0_0_20px_rgba(108,60,224,0.3)] mt-1"
      >
        Zaloguj się
      </button>

    </form>

    <!-- Footer -->
    <p class="text-xs text-[#9CA3AF] text-center mt-8">
      Problemy z logowaniem? <a href="mailto:support@weteach.ai" class="text-[#6C3CE0] hover:underline">Napisz do nas</a>
    </p>

  </div>

</div>
